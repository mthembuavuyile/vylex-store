<!DOCTYPE html>
<html lang="en-ZA">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Everyday-Supply-Co | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loader {
            border-top-color: #059669;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Custom scrollbar for mobile feel */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .safe-bottom {
            padding-bottom: calc(4rem + env(safe-area-inset-bottom));
        }

        /* Modal Animation */
        /* Critical Layout Fixes for when Tailwind CDN is slow or blocked */
        #nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }

        #top-header {
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .modal-fixed {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .modal-fixed {
                align-items: center;
            }
        }

        .nav-active {
            color: #059669 !important;
            transform: scale(1.1);
        }

        .nav-inactive {
            color: #9ca3af !important;
        }

        /* Ensure content doesn't ghost through on mobile */
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900 overflow-x-hidden"
    style="font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <div class="w-20 h-20 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="shield-check" class="w-10 h-10 text-emerald-600"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-900">Admin Portal</h2>
                <p class="text-gray-500 mt-2">Manage your inventory on the go.</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-sm font-bold text-gray-700 ml-1">Email</label>
                    <input type="email" id="email" placeholder="admin@everydaysupply.co"
                        class="w-full p-4 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                        required>
                </div>
                <div class="space-y-1">
                    <label class="text-sm font-bold text-gray-700 ml-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••"
                        class="w-full p-4 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                        required>
                </div>
                <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-emerald-100 active:scale-[0.98]">
                    Unlock Dashboard
                </button>
            </form>
            <p id="auth-error" class="text-red-500 text-center text-sm font-semibold hidden"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden min-h-screen pb-24">

        <!-- TOP HEADER -->
        <header id="top-header" class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center w-full">
                <div>
                    <h1 id="view-title" class="text-2xl font-extrabold text-gray-900">Inventory</h1>
                    <p id="admin-email-display" class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">
                    </p>
                </div>
                <div class="flex gap-3">
                    <button id="search-toggle" class="p-2 text-gray-500 hover:bg-gray-100 rounded-xl transition">
                        <i data-lucide="search" class="w-6 h-6"></i>
                    </button>
                    <a href="index.html" target="_blank"
                        class="p-2 text-gray-500 hover:bg-gray-100 rounded-xl transition">
                        <i data-lucide="external-link" class="w-6 h-6"></i>
                    </a>
                </div>
            </div>

            <!-- SEARCH BAR (Toggleable) -->
            <div id="search-container" class="max-w-4xl mx-auto mt-4 hidden">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="text" id="inventory-search" placeholder="Search products..."
                        class="w-full pl-12 pr-4 py-3 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
            </div>
        </header>

        <!-- CONTENT VIEWS -->
        <main class="max-w-4xl mx-auto p-6">

            <!-- INVENTORY VIEW -->
            <div id="inventory-view" class="space-y-4">
                <div id="inventory-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Cards injected here -->
                    <div class="animate-pulse space-y-4">
                        <div class="bg-gray-200 h-24 rounded-2xl"></div>
                        <div class="bg-gray-200 h-24 rounded-2xl"></div>
                        <div class="bg-gray-200 h-24 rounded-2xl"></div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS/PROFILE VIEW -->
            <div id="settings-view" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-900 mb-4">Account</h3>
                    <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl mb-6">
                        <div
                            class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 font-bold text-xl">
                            A</div>
                        <div class="flex-1 min-w-0">
                            <p class="font-bold text-gray-800 truncate">Admin User</p>
                            <p id="settings-email" class="text-sm text-gray-500 truncate"></p>
                        </div>
                    </div>
                    <button id="logout-btn"
                        class="w-full flex items-center justify-center gap-3 py-4 bg-red-50 text-red-600 font-bold rounded-2xl hover:bg-red-100 transition active:scale-[0.98]">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        Sign Out
                    </button>
                </div>
                <div class="text-center text-xs text-gray-400">
                    Version 2.0.0 (App UI)
                </div>
            </div>

        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav id="nav-bar" class="bg-white/90 backdrop-blur-xl border-t border-gray-100 px-6 py-3 pb-8 md:pb-4">
            <div class="max-w-md mx-auto flex justify-between items-center w-full">
                <button id="nav-inventory"
                    class="flex-1 flex flex-col items-center gap-1 text-emerald-600 transition-all scale-110">
                    <i data-lucide="layout-grid" class="w-6 h-6"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest leading-none">Stock</span>
                </button>

                <!-- FAB-style Middle Button -->
                <div class="relative w-16 h-14 flex justify-center items-center">
                    <button id="open-add-modal"
                        class="absolute -top-6 flex items-center justify-center w-14 h-14 bg-emerald-600 text-white rounded-full shadow-lg shadow-emerald-200 transition-transform active:scale-95">
                        <i data-lucide="plus" class="w-8 h-8"></i>
                    </button>
                </div>

                <button id="nav-settings" class="flex-1 flex flex-col items-center gap-1 text-gray-400 transition-all">
                    <i data-lucide="user" class="w-6 h-6"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest leading-none">Admin</span>
                </button>
            </div>
        </nav>

    </div>

    <!-- PRODUCT MODAL (Drawer style on mobile) -->
    <div id="product-modal"
        class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-sm hidden flex items-end md:items-center justify-center p-0 md:p-6 opacity-0">
        <div id="product-modal-content"
            class="bg-white w-full max-w-xl rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 md:p-10 space-y-6 translate-y-full shadow-2xl">
            <div class="flex justify-between items-center mb-2">
                <h2 id="modal-title" class="text-2xl font-extrabold text-gray-900">Add Product</h2>
                <button id="close-modal" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="product-form" class="space-y-5">
                <input type="hidden" id="p-id" value="">

                <div class="space-y-1">
                    <label class="text-sm font-bold text-gray-700 ml-1">Product Name</label>
                    <input type="text" id="p-name"
                        class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                        placeholder="e.g. Indomie Noodles" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-gray-700 ml-1">Price (R)</label>
                        <input type="number" step="0.01" id="p-price"
                            class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                            placeholder="0.00" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-gray-700 ml-1">Category</label>
                        <input type="text" id="p-category"
                            class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                            list="category-suggestions" placeholder="Pantry" required>
                        <datalist id="category-suggestions">
                            <option value="Noodles"></option>
                            <option value="Cleaning"></option>
                            <option value="Pantry"></option>
                        </datalist>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-bold text-gray-700 ml-1">Image URL</label>
                    <input type="url" id="p-image-url" placeholder="https://..."
                        class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                        required>
                </div>

                <div class="pt-4 pb-4 md:pb-0">
                    <button type="submit" id="submit-btn"
                        class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition active:scale-[0.98] flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        <span id="btn-text">Save Product</span>
                    </button>
                    <div id="status" class="mt-4 text-center text-sm font-bold h-6"></div>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[110] flex flex-col gap-2 w-max max-w-[90vw] pointer-events-none"></div>

    <script type="module" src="./js/admin-logic.js"></script>
    <script>
        // Set viewport height for mobile browsers to handle address bar
        const SET_VH = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', SET_VH);
        SET_VH();
    </script>
</body>

</html>
